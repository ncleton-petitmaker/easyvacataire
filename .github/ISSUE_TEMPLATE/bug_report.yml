name: "Bug Report"
description: "Signaler un bug ou un comportement inattendu"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de prendre le temps de signaler ce bug ! Remplissez les champs ci-dessous pour nous aider à le reproduire et le corriger.

  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Une description claire et concise du bug.
      placeholder: "Quand je clique sur le bouton X, il se passe Y au lieu de Z."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes de reproduction
      description: Les étapes pour reproduire le comportement.
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Scroller vers '...'
        4. Voir l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Ce que vous attendiez comme résultat.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Captures d'écran
      description: Si applicable, ajoutez des captures d'écran.
    validations:
      required: false

  - type: dropdown
    id: environment
    attributes:
      label: Environnement
      options:
        - Développement local
        - Production (Docker)
        - Production (VPS)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Version de Node.js
      placeholder: "v20.x.x"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Contexte additionnel
      description: Tout autre contexte utile (logs, configuration, etc.)
    validations:
      required: false
